<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>type-flag</title>
        <style>
            @font-face {
                font-family: "Type Flag Web";
                src: url("type-flag.ttf") format("truetype");
            }

            body {
                margin: 0;
                padding: 24px;
                background: #f7f4ef;
                color: #111111;
                font-family: system-ui, sans-serif;
            }

            .grid {
                display: grid;
                gap: 16px;
                max-width: 1000px;
                margin: 0 auto;
            }

            .warn {
                padding: 12px 14px;
                border: 1px solid #d9b14d;
                border-radius: 10px;
                background: #fff5da;
                font:
                    14px/1.4 system-ui,
                    sans-serif;
            }

            label {
                font-size: 14px;
            }

            textarea,
            .render {
                width: 100%;
                min-height: 28vh;
                padding: 16px;
                border: 1px solid #d6d1c6;
                border-radius: 10px;
                background: #ffffff;
                color: #111111;
            }

            textarea {
                font:
                    20px/1.4 system-ui,
                    sans-serif;
                resize: vertical;
            }

            .render {
                font:
                    64px/1.2 "Type Flag Web",
                    monospace;
                white-space: pre-wrap;
                word-break: break-word;
                font-variant-ligatures: common-ligatures;
                font-feature-settings: "liga" 1;
            }
        </style>
    </head>
    <body>
        <div class="grid">
            <div id="warn" class="warn" hidden></div>
            <div>
                <label for="plain">Input (plain)</label>
                <textarea
                    id="plain"
                    spellcheck="false"
                    placeholder="Type here"
                ></textarea>
            </div>
            <div>
                <label for="rendered">Render (Type Flag)</label>
                <div id="rendered" class="render"></div>
            </div>
        </div>
        <script>
            const input = document.getElementById("plain");
            const rendered = document.getElementById("rendered");
            const warn = document.getElementById("warn");
            let rehintFrame = 0;
            if (location.protocol === "file:") {
                warn.hidden = false;
                warn.textContent =
                    "This page is opened via file://, and many browsers block local @font-face loads. Start a local HTTP server in public/ and open http://127.0.0.1:8000/";
            }
            const rehintTick = () => {
                rehintFrame = (rehintFrame + 1) % 3;
                rendered.style.letterSpacing = `${(rehintFrame * 0.01).toFixed(2)}px`;
                requestAnimationFrame(rehintTick);
            };
            if (document.fonts) {
                document.fonts.ready.then(() => requestAnimationFrame(rehintTick));
            } else {
                requestAnimationFrame(rehintTick);
            }
            const sync = () => {
                rendered.textContent = input.value;
            };
            input.addEventListener("input", sync);
            sync();
        </script>
    </body>
</html>
